name: Telegram Bot (on-demand analysis)

# Polls every 5 min.  When you send /analysis (or any /command) in
# your Telegram chat, nightly_engine.py fires and sends the full
# WHY-analysis message back to you within ~1-2 minutes.
#
# Also triggerable manually from GitHub Actions UI at any time.

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes, 24x7
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  poll-and-analyze:
    name: Poll Telegram & run analysis if commanded
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase --quiet

      - name: Poll Telegram & run analysis if commanded
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID:         ${{ secrets.TG_CHAT_ID }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/tg_bot.py
